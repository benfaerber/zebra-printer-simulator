<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zebra Printer Simulator</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; color: #1f2937; padding: 24px; }
  h1 { font-size: 1.5rem; margin-bottom: 8px; }
  .subtitle { color: #6b7280; font-size: 0.875rem; margin-bottom: 24px; }
  .status-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
  .status-chip { padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
  .chip-ok { background: #d1fae5; color: #065f46; }
  .chip-err { background: #fee2e2; color: #991b1b; }
  .chip-info { background: #dbeafe; color: #1e40af; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .controls button { padding: 6px 14px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; cursor: pointer; font-size: 0.8rem; }
  .controls button:hover { background: #f9fafb; }
  .controls button.active { background: #fef2f2; border-color: #fca5a5; color: #991b1b; }
  .speed-controls { align-items: center; }
  .speed-controls .control-label { font-size: 0.8rem; font-weight: 600; color: #6b7280; margin-right: 4px; }
  .speed-controls button.active { background: #eff6ff; border-color: #93c5fd; color: #1e40af; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .card { background: #fff; border-radius: 8px; border: 1px solid #e5e7eb; overflow: hidden; position: relative; }
  .card img { width: 100%; display: block; background: #fff; image-rendering: pixelated; }
  .card-body { padding: 12px; }
  .card-body .filename { font-weight: 600; font-size: 0.85rem; word-break: break-all; }
  .card-body .meta { color: #6b7280; font-size: 0.75rem; margin-top: 4px; }
  .card .delete-btn { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; border: none; background: rgba(17, 24, 39, 0.65); color: #fff; font-size: 1rem; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s ease, background 0.15s ease; }
  .card:hover .delete-btn { opacity: 1; }
  .card .delete-btn:hover { background: #dc2626; }
  .card .delete-btn:focus { opacity: 1; outline: 2px solid #2563eb; outline-offset: 2px; }
  .empty { text-align: center; padding: 60px 20px; color: #9ca3af; }
  .empty p { font-size: 1.1rem; margin-bottom: 4px; }
  .auto-refresh { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #6b7280; margin-bottom: 16px; }
  .auto-refresh input { accent-color: #3b82f6; }
  .header-row { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
  .header-row a { color: #2563eb; text-decoration: none; font-size: 0.85rem; }
  .header-row a:hover { text-decoration: underline; }
  .card img { cursor: zoom-in; }
  .viewer { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.88); display: none; align-items: center; justify-content: center; z-index: 1000; user-select: none; }
  .viewer.open { display: flex; }
  .viewer-stage { position: relative; width: 100%; height: 100%; overflow: hidden; cursor: grab; }
  .viewer-stage.dragging { cursor: grabbing; }
  .viewer-stage img { position: absolute; top: 50%; left: 50%; transform-origin: center center; max-width: none; image-rendering: pixelated; will-change: transform; }
  .viewer-toolbar { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; background: rgba(17, 24, 39, 0.85); padding: 6px; border-radius: 8px; }
  .viewer-toolbar button { background: transparent; color: #fff; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; min-width: 36px; }
  .viewer-toolbar button:hover { background: rgba(255, 255, 255, 0.15); }
  .viewer-toolbar .zoom-level { color: #9ca3af; padding: 6px 8px; font-size: 0.8rem; font-variant-numeric: tabular-nums; }
  .viewer-close { position: absolute; top: 16px; right: 16px; background: rgba(17, 24, 39, 0.85); color: #fff; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
  .viewer-close:hover { background: #dc2626; }
  .viewer-filename { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); color: #d1d5db; font-size: 0.85rem; background: rgba(17, 24, 39, 0.85); padding: 6px 12px; border-radius: 4px; max-width: 80%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
</style>
</head>
<body>

<div class="header-row">
  <h1>Zebra Printer Simulator</h1>
  <a href="/preview">ZPL Preview &rarr;</a>
</div>
<p class="subtitle">Rendered labels appear here as they are printed.</p>

<div class="status-bar" id="statusBar"></div>

<div class="controls" id="controls">
  <button onclick="toggleFlag('paper_out')">Paper Out</button>
  <button onclick="toggleFlag('paused')">Paused</button>
  <button onclick="toggleFlag('head_up')">Head Up</button>
  <button onclick="toggleFlag('ribbon_out')">Ribbon Out</button>
  <button onclick="toggleFlag('under_temp')">Under Temp</button>
  <button onclick="toggleFlag('over_temp')">Over Temp</button>
</div>

<div class="controls speed-controls" id="speedControls">
  <span class="control-label">Print Speed</span>
  <button data-speed="fast" onclick="setSpeed('fast')">Fast</button>
  <button data-speed="normal" onclick="setSpeed('normal')">Normal</button>
  <button data-speed="slow" onclick="setSpeed('slow')">Slow</button>
</div>

<div class="auto-refresh">
  <input type="checkbox" id="autoRefresh" checked>
  <label for="autoRefresh">Auto-refresh every 3s (fallback when live updates are unavailable)</label>
</div>

<div id="content"></div>

<div class="viewer" id="viewer" role="dialog" aria-modal="true" aria-label="Label viewer">
  <div class="viewer-stage" id="viewerStage">
    <img id="viewerImage" alt="">
  </div>
  <div class="viewer-toolbar">
    <button id="viewerZoomOut" title="Zoom out (-)">&minus;</button>
    <span class="zoom-level" id="viewerZoomLevel">100%</span>
    <button id="viewerZoomIn" title="Zoom in (+)">+</button>
    <button id="viewerRotate" title="Rotate 90&deg; (r)">&#x21bb;</button>
    <button id="viewerReset" title="Reset (0)">Reset</button>
  </div>
  <div class="viewer-filename" id="viewerFilename"></div>
  <button class="viewer-close" id="viewerClose" title="Close (Esc)" aria-label="Close">&times;</button>
</div>

<script>
const state = {};
let refreshTimer = null;

class LabelViewer {
  static MIN_SCALE = 0.1;
  static MAX_SCALE = 16;
  static ZOOM_STEP = 1.25;
  static WHEEL_ZOOM_STEP = 1.1;

  constructor() {
    this.root = document.getElementById('viewer');
    this.stage = document.getElementById('viewerStage');
    this.image = document.getElementById('viewerImage');
    this.zoomLevel = document.getElementById('viewerZoomLevel');
    this.filenameEl = document.getElementById('viewerFilename');
    this.scale = 1;
    this.rotation = 0;
    this.tx = 0;
    this.ty = 0;
    this.dragging = false;
    this.moved = false;
    this.dragStart = null;
    this.bind();
  }

  bind() {
    document.getElementById('viewerZoomIn').addEventListener('click', () => this.zoom(LabelViewer.ZOOM_STEP));
    document.getElementById('viewerZoomOut').addEventListener('click', () => this.zoom(1 / LabelViewer.ZOOM_STEP));
    document.getElementById('viewerRotate').addEventListener('click', () => this.rotate());
    document.getElementById('viewerReset').addEventListener('click', () => this.resetTransform());
    document.getElementById('viewerClose').addEventListener('click', () => this.close());
    this.root.addEventListener('click', e => { if (e.target === this.root) this.close(); });
    this.stage.addEventListener('click', e => { if (e.target === this.stage && !this.moved) this.close(); });
    this.stage.addEventListener('wheel', e => this.onWheel(e), { passive: false });
    this.stage.addEventListener('mousedown', e => this.onDragStart(e));
    window.addEventListener('mousemove', e => this.onDragMove(e));
    window.addEventListener('mouseup', () => this.onDragEnd());
    window.addEventListener('keydown', e => this.onKey(e));
  }

  open(url, filename) {
    this.image.src = url;
    this.image.alt = filename;
    this.filenameEl.textContent = filename;
    this.resetTransform();
    this.root.classList.add('open');
  }

  close() {
    this.root.classList.remove('open');
    this.image.src = '';
  }

  isOpen() {
    return this.root.classList.contains('open');
  }

  resetTransform() {
    this.scale = 1;
    this.rotation = 0;
    this.tx = 0;
    this.ty = 0;
    this.applyTransform();
  }

  applyTransform() {
    this.image.style.transform =
      `translate(-50%, -50%) translate(${this.tx}px, ${this.ty}px) rotate(${this.rotation}deg) scale(${this.scale})`;
    this.zoomLevel.textContent = `${Math.round(this.scale * 100)}%`;
  }

  zoom(factor) {
    const next = this.scale * factor;
    this.scale = Math.min(LabelViewer.MAX_SCALE, Math.max(LabelViewer.MIN_SCALE, next));
    this.applyTransform();
  }

  rotate() {
    this.rotation = (this.rotation + 90) % 360;
    this.applyTransform();
  }

  onWheel(e) {
    e.preventDefault();
    const factor = e.deltaY < 0 ? LabelViewer.WHEEL_ZOOM_STEP : 1 / LabelViewer.WHEEL_ZOOM_STEP;
    this.zoom(factor);
  }

  onDragStart(e) {
    if (e.button !== 0) return;
    this.dragging = true;
    this.moved = false;
    this.dragStart = { x: e.clientX - this.tx, y: e.clientY - this.ty };
    this.stage.classList.add('dragging');
  }

  onDragMove(e) {
    if (!this.dragging) return;
    this.moved = true;
    this.tx = e.clientX - this.dragStart.x;
    this.ty = e.clientY - this.dragStart.y;
    this.applyTransform();
  }

  onDragEnd() {
    if (!this.dragging) return;
    this.dragging = false;
    this.stage.classList.remove('dragging');
  }

  onKey(e) {
    if (!this.isOpen()) return;
    switch (e.key) {
      case 'Escape': this.close(); break;
      case '+': case '=': this.zoom(LabelViewer.ZOOM_STEP); break;
      case '-': case '_': this.zoom(1 / LabelViewer.ZOOM_STEP); break;
      case 'r': case 'R': this.rotate(); break;
      case '0': this.resetTransform(); break;
      default: return;
    }
    e.preventDefault();
  }
}

const viewer = new LabelViewer();

async function fetchStatus() {
  try {
    const res = await fetch('/status');
    const data = await res.json();
    Object.assign(state, data);
    renderStatus(data);
    updateButtons(data);
    updateSpeedButtons(data);
  } catch (e) {
    console.error('Status fetch failed', e);
  }
}

function renderStatus(s) {
  const bar = document.getElementById('statusBar');
  const chips = [];

  const ready = !s.paper_out && !s.paused && !s.head_up && !s.ribbon_out && !s.under_temp && !s.over_temp;
  chips.push(ready
    ? '<span class="status-chip chip-ok">Ready</span>'
    : '<span class="status-chip chip-err">Error</span>');

  chips.push(`<span class="status-chip chip-info">Labels: ${s.label_count}</span>`);

  if (s.print_speed) {
    chips.push(`<span class="status-chip chip-info">Speed: ${s.print_speed}</span>`);
  }

  if (s.formats_in_buffer > 0) {
    chips.push(`<span class="status-chip chip-info">Buffer: ${s.formats_in_buffer}</span>`);
  }

  const flags = ['paper_out','paused','head_up','ribbon_out','under_temp','over_temp'];
  for (const f of flags) {
    if (s[f]) {
      chips.push(`<span class="status-chip chip-err">${f.replace(/_/g, ' ')}</span>`);
    }
  }

  bar.innerHTML = chips.join('');
}

function updateButtons(s) {
  const flags = ['paper_out','paused','head_up','ribbon_out','under_temp','over_temp'];
  const buttons = document.querySelectorAll('#controls button');
  buttons.forEach((btn, i) => {
    btn.classList.toggle('active', !!s[flags[i]]);
  });
}

async function toggleFlag(flag) {
  const current = !!state[flag];
  await fetch('/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ flag, enabled: !current }),
  });
  fetchStatus();
}

function updateSpeedButtons(s) {
  const buttons = document.querySelectorAll('#speedControls button');
  buttons.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.speed === s.print_speed);
  });
}

async function setSpeed(speed) {
  await fetch('/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ flag: 'speed', speed }),
  });
  fetchStatus();
}

async function fetchLabels() {
  try {
    const res = await fetch('/jobs');
    const data = await res.json();
    renderLabels(data.labels || []);
  } catch (e) {
    console.error('Jobs fetch failed', e);
  }
}

function renderLabels(labels) {
  const el = document.getElementById('content');

  if (labels.length === 0) {
    el.innerHTML = '<div class="empty"><p>No labels printed yet.</p><p>Send ZPL data to the simulator TCP port to see labels here.</p></div>';
    return;
  }

  const cards = labels.map(l => {
    const sizeKB = (l.size_bytes / 1024).toFixed(1);
    const dims = l.width && l.height ? `${l.width} x ${l.height} px` : '';
    return `<div class="card">
      <button class="delete-btn" data-filename="${esc(l.filename)}" title="Delete label" aria-label="Delete ${esc(l.filename)}">&times;</button>
      <img src="${esc(l.url)}" alt="${esc(l.filename)}" loading="lazy" data-url="${esc(l.url)}" data-filename="${esc(l.filename)}">
      <div class="card-body">
        <div class="filename">${esc(l.filename)}</div>
        <div class="meta">${esc(l.timestamp)} &middot; ${sizeKB} KB${dims ? ' &middot; ' + dims : ''}</div>
      </div>
    </div>`;
  });

  el.innerHTML = `<div class="grid">${cards.join('')}</div>`;
  el.querySelectorAll('.delete-btn').forEach(btn => {
    btn.addEventListener('click', () => deleteLabel(btn.dataset.filename));
  });
  el.querySelectorAll('.card img').forEach(img => {
    img.addEventListener('click', () => viewer.open(img.dataset.url, img.dataset.filename));
  });
}

async function deleteLabel(filename) {
  if (!filename) return;
  if (!confirm(`Delete ${filename}?`)) return;
  try {
    const res = await fetch(`/jobs/${encodeURIComponent(filename)}`, { method: 'DELETE' });
    if (!res.ok && res.status !== 404) {
      const msg = await res.text();
      alert(`Delete failed: ${msg || res.statusText}`);
      return;
    }
    fetchLabels();
  } catch (e) {
    console.error('Delete failed', e);
    alert('Delete failed: network error');
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function refresh() {
  fetchStatus();
  fetchLabels();
}

let sseConnected = false;

function startPolling() {
  if (refreshTimer || sseConnected) return;
  if (!document.getElementById('autoRefresh').checked) return;
  refreshTimer = setInterval(refresh, 3000);
}

function stopPolling() {
  if (refreshTimer) {
    clearInterval(refreshTimer);
    refreshTimer = null;
  }
}

function setupAutoRefresh() {
  const cb = document.getElementById('autoRefresh');
  cb.addEventListener('change', () => cb.checked ? startPolling() : stopPolling());
  startPolling();
}

// Live updates via server-sent events. When the stream is connected, polling
// is unnecessary; if it drops, polling resumes as a fallback.
function connectEvents() {
  if (!window.EventSource) return;
  const es = new EventSource('/events');
  es.onopen = () => { sseConnected = true; stopPolling(); };
  es.onmessage = () => refresh();
  es.onerror = () => { sseConnected = false; startPolling(); };
}

refresh();
setupAutoRefresh();
connectEvents();
</script>
</body>
</html>
