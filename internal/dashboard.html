<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Printer Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f3f4f6; color: #1f2937; padding: 24px; }
  h1 { font-size: 1.5rem; margin-bottom: 8px; }
  .subtitle { color: #6b7280; font-size: 0.875rem; margin-bottom: 24px; }
  .status-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
  .status-chip { padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
  .chip-ok { background: #d1fae5; color: #065f46; }
  .chip-err { background: #fee2e2; color: #991b1b; }
  .chip-info { background: #dbeafe; color: #1e40af; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .controls button { padding: 6px 14px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; cursor: pointer; font-size: 0.8rem; }
  .controls button:hover { background: #f9fafb; }
  .controls button.active { background: #fef2f2; border-color: #fca5a5; color: #991b1b; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }
  .card { background: #fff; border-radius: 8px; border: 1px solid #e5e7eb; overflow: hidden; }
  .card img { width: 100%; display: block; background: #fff; image-rendering: pixelated; }
  .card-body { padding: 12px; }
  .card-body .filename { font-weight: 600; font-size: 0.85rem; word-break: break-all; }
  .card-body .meta { color: #6b7280; font-size: 0.75rem; margin-top: 4px; }
  .empty { text-align: center; padding: 60px 20px; color: #9ca3af; }
  .empty p { font-size: 1.1rem; margin-bottom: 4px; }
  .auto-refresh { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #6b7280; margin-bottom: 16px; }
  .auto-refresh input { accent-color: #3b82f6; }
  .header-row { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
  .header-row a { color: #2563eb; text-decoration: none; font-size: 0.85rem; }
  .header-row a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header-row">
  <h1>Printer Simulator</h1>
  <a href="/preview">ZPL Preview &rarr;</a>
</div>
<p class="subtitle">Rendered labels appear here as they are printed.</p>

<div class="status-bar" id="statusBar"></div>

<div class="controls" id="controls">
  <button onclick="toggleFlag('paper_out')">Paper Out</button>
  <button onclick="toggleFlag('paused')">Paused</button>
  <button onclick="toggleFlag('head_up')">Head Up</button>
  <button onclick="toggleFlag('ribbon_out')">Ribbon Out</button>
  <button onclick="toggleFlag('under_temp')">Under Temp</button>
  <button onclick="toggleFlag('over_temp')">Over Temp</button>
</div>

<div class="auto-refresh">
  <input type="checkbox" id="autoRefresh" checked>
  <label for="autoRefresh">Auto-refresh every 3s</label>
</div>

<div id="content"></div>

<script>
const state = {};
let refreshTimer = null;

async function fetchStatus() {
  try {
    const res = await fetch('/status');
    const data = await res.json();
    Object.assign(state, data);
    renderStatus(data);
    updateButtons(data);
  } catch (e) {
    console.error('Status fetch failed', e);
  }
}

function renderStatus(s) {
  const bar = document.getElementById('statusBar');
  const chips = [];

  const ready = !s.paper_out && !s.paused && !s.head_up && !s.ribbon_out && !s.under_temp && !s.over_temp;
  chips.push(ready
    ? '<span class="status-chip chip-ok">Ready</span>'
    : '<span class="status-chip chip-err">Error</span>');

  chips.push(`<span class="status-chip chip-info">Labels: ${s.label_count}</span>`);

  if (s.formats_in_buffer > 0) {
    chips.push(`<span class="status-chip chip-info">Buffer: ${s.formats_in_buffer}</span>`);
  }

  const flags = ['paper_out','paused','head_up','ribbon_out','under_temp','over_temp'];
  for (const f of flags) {
    if (s[f]) {
      chips.push(`<span class="status-chip chip-err">${f.replace(/_/g, ' ')}</span>`);
    }
  }

  bar.innerHTML = chips.join('');
}

function updateButtons(s) {
  const flags = ['paper_out','paused','head_up','ribbon_out','under_temp','over_temp'];
  const buttons = document.querySelectorAll('#controls button');
  buttons.forEach((btn, i) => {
    btn.classList.toggle('active', !!s[flags[i]]);
  });
}

async function toggleFlag(flag) {
  const current = !!state[flag];
  await fetch('/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ flag, enabled: !current }),
  });
  fetchStatus();
}

async function fetchLabels() {
  try {
    const res = await fetch('/jobs');
    const data = await res.json();
    renderLabels(data.labels || []);
  } catch (e) {
    console.error('Jobs fetch failed', e);
  }
}

function renderLabels(labels) {
  const el = document.getElementById('content');

  if (labels.length === 0) {
    el.innerHTML = '<div class="empty"><p>No labels printed yet.</p><p>Send ZPL data to the simulator TCP port to see labels here.</p></div>';
    return;
  }

  const cards = labels.map(l => {
    const sizeKB = (l.size_bytes / 1024).toFixed(1);
    const dims = l.width && l.height ? `${l.width} x ${l.height} px` : '';
    return `<div class="card">
      <a href="${esc(l.url)}" target="_blank"><img src="${esc(l.url)}" alt="${esc(l.filename)}" loading="lazy"></a>
      <div class="card-body">
        <div class="filename">${esc(l.filename)}</div>
        <div class="meta">${esc(l.timestamp)} &middot; ${sizeKB} KB${dims ? ' &middot; ' + dims : ''}</div>
      </div>
    </div>`;
  });

  el.innerHTML = `<div class="grid">${cards.join('')}</div>`;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function refresh() {
  fetchStatus();
  fetchLabels();
}

function setupAutoRefresh() {
  const cb = document.getElementById('autoRefresh');
  cb.addEventListener('change', () => {
    if (cb.checked) {
      refreshTimer = setInterval(refresh, 3000);
    } else {
      clearInterval(refreshTimer);
    }
  });
  refreshTimer = setInterval(refresh, 3000);
}

refresh();
setupAutoRefresh();
</script>
</body>
</html>
